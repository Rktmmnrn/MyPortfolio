<?xml version="1.0" encoding="utf-8"?>
<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeUp {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { r: 5; opacity: 1; }
        50%       { r: 7; opacity: 0.65; }
      }
      @keyframes drawLine {
        0%   { stroke-dashoffset: 300; opacity: 0; }
        8%   { opacity: 1; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes slideIn {
        0%   { opacity: 0; letter-spacing: 10px; }
        100% { opacity: 1; letter-spacing: 4px; }
      }
      @keyframes fadeBadge {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }

      .ltr {
        font-family: 'Courier New', monospace;
        font-size: 72px;
        font-weight: 600;
        fill: #1A1A1A;
        opacity: 0;
        animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) forwards;
      }
      .lN { animation-delay: 0.1s; }
      .lA { animation-delay: 0.25s; }
      .lV { animation-delay: 0.4s; }
      .lO { animation-delay: 0.65s; }

      .dot {
        fill: #2563EB;
        opacity: 0;
        animation: fadeUp 0.4s ease 0.52s forwards, pulse 2.2s ease-in-out 1.2s infinite;
      }

      <!-- .uline {
        stroke: #2563EB;
        stroke-width: 1.8;
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: drawLine 0.85s cubic-bezier(.22,1,.36,1) 1.1s forwards;
      } -->

      .tag {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #888780;
        letter-spacing: 4px;
        opacity: 0;
        animation: slideIn 0.7s ease 1.65s forwards;
      }

      <!-- .badge-bg  { opacity: 0; animation: fadeBadge 0.5s ease 2.1s forwards; }
      .badge-bg2 { opacity: 0; animation: fadeBadge 0.5s ease 2.3s forwards; }
      .badge-bg3 { opacity: 0; animation: fadeBadge 0.5s ease 2.5s forwards; } -->
      .badge-txt {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <!-- Letters N A V · O centered -->
  <text class="ltr lI" x="152" y="96" text-anchor="middle">I</text>
  <text class="ltr lA" x="205" y="96" text-anchor="middle">A</text>
  <text class="ltr lV" x="258" y="96" text-anchor="middle">V</text>
  <text class="ltr lO" x="315" y="96" text-anchor="middle">O</text>
  <circle class="dot" cx="315" cy="108" r="5"/>

  <!-- Underline wave -->
  <!-- <path class="uline" d="M152 108 Q230 104 305 108 Q380 112 448 108"/> -->

  <!-- Tagline -->
  <text class="tag" x="340" y="140" text-anchor="middle">DEV · CYBERSEC · BUILDER</text>

