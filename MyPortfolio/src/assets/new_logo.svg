    <rect x="192" y="148" width="78" height="20" rx="10" fill="#EBF0FD" stroke="#2563EB" stroke-width="0.5"/>
    <text class="badge-txt" x="231" y="158.5" text-anchor="middle" fill="#2563EB">Recherche_stage</text>
  </g>
